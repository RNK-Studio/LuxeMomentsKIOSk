<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LuxeMoments Photobooth</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
    <div id="app">
        <!-- Hidden Admin Area (Top Right Corner - tap 5x) -->
        <div id="admin-trigger" onclick="app.handleAdminTap(event)"></div>

        <!-- Screens -->
        <!-- 1. Home / Idle Screen -->
        <section id="screen-home" class="screen active" onclick="app.handleHomeTouch(event)">
            <!-- Top Controls -->
            <div class="home-top-controls">
                <!-- Gallery Button (Top Left) -->
                <button id="home-gallery-btn" class="glass-action-btn" onclick="app.openGallery(event)">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="28" height="28">
                        <rect x="3" y="3" width="18" height="18" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
                        <path d="M20.5 15.5l-4-4a1 1 0 0 0-1.4 0l-4 4a1 1 0 0 1-1.4 0l-2-2a1 1 0 0 0-1.4 0l-3.3 3.3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="btn-label">Gallery</span>
                </button>

                <!-- Admin Button (Top Right) -->
                <button id="home-admin-btn" class="glass-action-btn" onclick="app.openAdmin(event)">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="28" height="28">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M7 16.5c0-1.5 2-2.5 5-2.5s5 1 5 2.5" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span class="btn-label">Admin</span>
                </button>
            </div>

            <!-- Center Content -->
            <div class="home-center-content">
                <h1 class="home-title">Hey!<br>Let's take some pictures!</h1>
                <div class="home-camera-emoji">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
                        <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
                    </svg>
                </div>
            </div>

            <!-- Bottom Mode Bar -->
            <div class="home-bottom-bar">
                <div class="home-modes-panel glass-panel">
                    <button class="mode-select-btn" data-mode="image" onclick="app.selectMode('image', event)">
                        <svg class="icon-svg" viewBox="0 0 24 24" width="36" height="36">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l1.5-2.5a1 1 0 0 1 .8-.5h7.4a1 1 0 0 1 .8.5L17 6h4a2 2 0 0 1 2 2v11z" fill="none" stroke="currentColor" stroke-width="2"/>
                            <circle cx="12" cy="13" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span class="mode-label">Image</span>
                    </button>
                    <button class="mode-select-btn active" data-mode="collage" onclick="app.selectMode('collage', event)">
                        <svg class="icon-svg" viewBox="0 0 24 24" width="36" height="36">
                            <rect x="2" y="2" width="9" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="2"/>
                            <rect x="13" y="2" width="9" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/>
                            <rect x="13" y="12" width="9" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="2"/>
                            <rect x="2" y="18" width="9" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span class="mode-label">Collage</span>
                    </button>
                    <button class="mode-select-btn" data-mode="animation" onclick="app.selectMode('animation', event)">
                        <svg class="icon-svg" viewBox="0 0 24 24" width="36" height="36">
                            <rect x="2" y="2" width="20" height="20" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
                            <text x="5" y="15" font-family="Outfit, sans-serif" font-weight="900" font-size="9" fill="currentColor">GIF</text>
                        </svg>
                        <span class="mode-label">Animation</span>
                    </button>
                    <button class="mode-select-btn" data-mode="video" onclick="app.selectMode('video', event)">
                        <svg class="icon-svg" viewBox="0 0 24 24" width="36" height="36">
                            <path d="M22 16V8a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
                            <path d="M2 10h20M7 6l3 4M14 6l3 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span class="mode-label">Video</span>
                    </button>
                    <button class="mode-select-btn" data-mode="wigglegram" onclick="app.selectMode('wigglegram', event)">
                        <svg class="icon-svg" viewBox="0 0 24 24" width="36" height="36">
                            <path d="M4 6h16M2 12h20M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <rect x="6" y="3" width="12" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(-5 12 12)"/>
                            <rect x="8" y="3" width="12" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(5 12 12)"/>
                        </svg>
                        <span class="mode-label">Wigglegram</span>
                    </button>
                </div>

                <!-- Green Screen / Background Removal Toggle (Bottom Right) -->
                <button id="home-chroma-toggle" class="glass-action-btn" onclick="app.toggleChromaKey(event)">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="28" height="28">
                        <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm-7 9a7 7 0 0 1 14 0" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M3 21h18M6 18h12" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
                    </svg>
                </button>
            </div>
            <!-- Slideshow Container -->
            <div id="slideshow-bg"></div>
        </section>

        <!-- 2. Capture Screen -->
        <section id="screen-capture" class="screen hidden">
            <div class="camera-container">
                <video id="camera-feed" autoplay playsinline></video>
                <!-- Canvas used for chroma key processing or mirroring -->
                <canvas id="camera-canvas" class="hidden"></canvas>
                <div id="countdown-overlay" class="hidden">3</div>
                
                <div class="camera-controls glass-panel">
                    <div class="control-group">
                        <label>Timer</label>
                        <div class="toggle-group">
                            <button class="toggle-btn active" data-timer="3">3s</button>
                            <button class="toggle-btn" data-timer="5">5s</button>
                            <button class="toggle-btn" data-timer="10">10s</button>
                        </div>
                    </div>
                    
                    <button id="capture-btn" class="capture-btn">
                        <div class="inner-circle"></div>
                    </button>
                    
                    <div class="control-group">
                        <label>Mode</label>
                        <div class="toggle-group">
                            <button class="toggle-btn active" data-mode="single">Single</button>
                            <button class="toggle-btn" data-mode="burst">Burst</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 3. Review & Edit Screen -->
        <section id="screen-review" class="screen hidden">
            <div class="review-container">
                <div class="preview-area">
                    <canvas id="collage-canvas"></canvas>
                    <!-- Audio/Video loop container for video/GIF/wigglegram reviews -->
                    <video id="review-video-loop" class="hidden" autoplay loop muted playsinline></video>
                </div>
                
                <div class="edit-sidebar glass-panel">
                    <h2>Creative Tools</h2>
                    
                    <div class="filter-section">
                        <h3>Filters</h3>
                        <div class="filter-scroll">
                            <button class="filter-btn active" data-filter="none">Normal</button>
                            <button class="filter-btn" data-filter="vintage">Vintage</button>
                            <button class="filter-btn" data-filter="bw">B&W</button>
                            <button class="filter-btn" data-filter="contrast">High Contrast</button>
                        </div>
                    </div>

                    <!-- Virtual Background / Green Screen controls -->
                    <div class="chroma-section" id="chroma-edit-controls">
                        <h3>Virtual Backgrounds</h3>
                        <div class="chroma-grid">
                            <button class="chroma-bg-btn active" data-bg="none" onclick="app.selectVirtualBg('none')">
                                <div class="bg-preview none">🚫</div>
                                <span class="bg-label">None</span>
                            </button>
                            <button class="chroma-bg-btn" data-bg="classic" onclick="app.selectVirtualBg('classic')">
                                <div class="bg-preview classic">🏁</div>
                                <span class="bg-label">Geometric</span>
                            </button>
                            <button class="chroma-bg-btn" data-bg="neon" onclick="app.selectVirtualBg('neon')">
                                <div class="bg-preview neon">🌌</div>
                                <span class="bg-label">Neon Cyber</span>
                            </button>
                            <button class="chroma-bg-btn" data-bg="pastel" onclick="app.selectVirtualBg('pastel')">
                                <div class="bg-preview pastel">☁️</div>
                                <span class="bg-label">Princess</span>
                            </button>
                            <button class="chroma-bg-btn" data-bg="tropical" onclick="app.selectVirtualBg('tropical')">
                                <div class="bg-preview tropical">🌅</div>
                                <span class="bg-label">Tropical</span>
                            </button>
                            <button class="chroma-bg-btn" data-bg="disco" onclick="app.selectVirtualBg('disco')">
                                <div class="bg-preview disco">✨</div>
                                <span class="bg-label">Disco Bokeh</span>
                            </button>
                        </div>
                        
                        <div class="chroma-adjustments">
                            <div class="slider-group">
                                <label>Sensitivity: <span id="chroma-val-tolerance">60</span></label>
                                <input type="range" id="chroma-slider-tolerance" min="10" max="150" value="60" oninput="app.updateChromaParams()">
                            </div>
                            <div class="slider-group">
                                <label>Edge Blend: <span id="chroma-val-smoothness">15</span></label>
                                <input type="range" id="chroma-slider-smoothness" min="0" max="50" value="15" oninput="app.updateChromaParams()">
                            </div>
                            <div class="picker-group">
                                <label>Key Color: </label>
                                <div class="color-picker-row">
                                    <input type="color" id="chroma-color-picker" value="#00ff00" onchange="app.updateChromaColor(this.value)">
                                    <span class="picker-tip">Or click green backdrop in preview to pick!</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="layout-section">
                        <h3>Layouts</h3>
                        <div class="layout-grid">
                            <button class="layout-btn active" data-layout="collage">Theme Collage</button>
                            <button class="layout-btn" data-layout="single">Single 4x6</button>
                            <button class="layout-btn" data-layout="strip-2x2">2x2 Strip</button>
                        </div>
                    </div>
                    
                    <div class="theme-section">
                        <h3>Themes (Collage)</h3>
                        <div class="layout-grid">
                            <button class="theme-btn active" data-theme="default">Princess</button>
                            <button class="theme-btn" data-theme="classic">Classic</button>
                            <button class="theme-btn" data-theme="neon">Neon</button>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="secondary-btn" onclick="app.retake()">Retake</button>
                        <button class="primary-btn" onclick="app.goToPrint()">Next ➔</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 4. Print & Share Screen -->
        <section id="screen-print" class="screen hidden">
            <div class="glass-panel text-center print-panel">
                <h2>All Set!</h2>
                <div id="final-preview">
                    <img id="final-image" src="" alt="Final Print Preview" />
                </div>
                
                <div class="print-controls">
                    <div class="copies-selector">
                        <button class="icon-btn" onclick="app.changeCopies(-1)">-</button>
                        <span id="copies-count">1</span>
                        <button class="icon-btn" onclick="app.changeCopies(1)">+</button>
                    </div>
                    <button class="primary-btn big-btn" onclick="app.printPhoto()">🖨️ Print Now</button>
                </div>

                <div class="cloud-status">
                    <div class="status-indicator">
                        <span id="upload-status-icon">☁️</span>
                        <span id="upload-status-text">Uploading to Gallery...</span>
                    </div>
                    <!-- QR Code container -->
                    <div id="qr-container" class="hidden"></div>
                </div>

                <button class="secondary-btn mt-4" onclick="app.resetKiosk()">Finish & Reset</button>
            </div>
        </section>

        <!-- Admin Overlay -->
        <section id="overlay-admin" class="overlay hidden">
            <div class="admin-panel glass-panel">
                <h2>Admin Settings</h2>
                <div class="settings-group">
                    <label>Event Name</label>
                    <input type="text" id="setting-event-name" placeholder="e.g. Kelsey turns 3!">
                </div>
                <div class="settings-group">
                    <label>Custom Background Image URL (Overrides themes)</label>
                    <input type="text" id="setting-bg-url" placeholder="https://...">
                </div>
                <div class="settings-group">
                    <label>Event Logo URL</label>
                    <input type="text" id="setting-logo-url" placeholder="https://...">
                </div>
                <div class="action-buttons" style="flex-wrap: wrap;">
                    <button class="secondary-btn" style="flex: 1 1 100%; margin-bottom: 0.5rem; border-color: rgba(239, 68, 68, 0.4); color: #ef4444;" onclick="app.clearGalleryHistory()">🗑️ Clear Gallery History</button>
                    <button class="secondary-btn" style="flex: 1;" onclick="app.closeAdmin()">Close</button>
                    <button class="primary-btn" style="flex: 1;" onclick="app.saveAdminSettings()">Save</button>
                </div>
            </div>
        </section>

        <!-- Gallery Overlay -->
        <section id="overlay-gallery" class="overlay hidden">
            <div class="gallery-panel glass-panel">
                <div class="gallery-header">
                    <h2>📸 Event Gallery</h2>
                    <button class="icon-btn close-gallery-btn" onclick="app.closeGallery()" style="width: auto; padding: 0.5rem 1.5rem; font-size: 1.1rem; border-radius: 20px;">✕ Close</button>
                </div>
                <div id="gallery-grid" class="gallery-grid">
                    <!-- Cards will be populated here -->
                </div>
            </div>
        </section>

        <!-- Gallery Single Item Preview Modal -->
        <div id="gallery-item-modal" class="overlay hidden" style="z-index: 3000; background: rgba(0,0,0,0.9);">
            <div class="glass-panel" style="max-width: min(500px, 95vw); width: min(500px, 95vw); display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 2rem;">
                <h3 style="font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 0.5rem;">Photo Preview</h3>
                <div id="gallery-item-media" style="width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);">
                    <!-- Video or Image -->
                </div>
                <div id="gallery-item-qr" style="display: flex; flex-direction: column; align-items: center; background: white; padding: 12px; border-radius: 12px; color: black;">
                    <!-- QR code image -->
                </div>
                <button class="primary-btn" style="width: 100%; font-size: 1.2rem; padding: 1rem;" onclick="app.closeGalleryItem()">Back to Gallery</button>
            </div>
        </div>
        
        <!-- Flash Effect -->
        <div id="flash-effect" class="hidden"></div>
    </div>

    <script src="app.js?v=20"></script>
    <script src="camera.js?v=20"></script>
    <script src="canvas.js?v=20"></script>
    <script src="imgur.js?v=20"></script>
</body>
</html>
